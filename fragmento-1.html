<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRAGMENTOS σ4 // DECODE</title>
  <link rel="stylesheet" href="assets/css/terminal.css">
  <style>
    body { overflow-y: auto; }

    .page {
      max-width: 1100px;
      margin: 60px auto 80px;
      padding: 0 30px;
      position: relative;
      z-index: 2;
    }

    .header-block {
      margin-bottom: 30px;
    }

    .billy-line {
      font-size: 16px;
      margin: 8px 0;
      animation: fadeSlideIn 0.6s;
    }
    .billy-line.muted { opacity: 0.7; font-size: 14px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 30px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      border: 1px solid #00ff00;
      box-shadow: 0 0 12px rgba(0, 255, 0, 0.3);
      padding: 20px;
      background: #000;
      transition: border-color 0.4s, box-shadow 0.4s;
    }
    .card.completed {
      border-color: #80ff80;
      box-shadow: 0 0 18px #00ff00;
    }
    .card-label {
      font-size: 11px;
      letter-spacing: 3px;
      opacity: 0.7;
      margin-bottom: 8px;
    }
    .card-title {
      font-size: 22px;
      margin: 0 0 14px;
      text-shadow: 0 0 4px #00ff00;
    }
    .card-hint {
      font-size: 12px;
      opacity: 0.6;
      margin-bottom: 10px;
      font-style: italic;
    }
    .card textarea {
      background: #000;
      color: #00ff00;
      border: 1px solid #00ff00;
      padding: 10px;
      font-family: inherit;
      font-size: 14px;
      width: 100%;
      min-height: 70px;
      resize: vertical;
      transition: border-color 0.3s;
    }
    .card textarea:focus {
      outline: none;
      border-color: #80ff80;
      box-shadow: 0 0 6px #00ff00;
    }
    .verify-mini {
      margin-top: 12px;
      padding: 6px 14px;
      width: auto;
      font-size: 12px;
      letter-spacing: 2px;
    }

    .card-status {
      margin-top: 14px;
      font-size: 13px;
      letter-spacing: 2px;
      min-height: 18px;
    }
    .card-status.error {
      color: #ff6060;
      animation: flashRed 0.4s;
    }
    .card.completed .card-status {
      color: #80ff80;
      text-shadow: 0 0 4px #00ff00;
    }
    .card.completed .card-status::before { content: '> '; }

    .reveal {
      margin-top: 50px;
      padding: 30px;
      border: 2px solid #00ff00;
      box-shadow: 0 0 20px #00ff00;
      text-align: center;
      display: none;
      animation: fadeSlideIn 1.2s;
    }
    .reveal.show { display: block; }
    .reveal-label {
      font-size: 12px;
      letter-spacing: 3px;
      opacity: 0.7;
      margin-bottom: 10px;
    }
    .reveal-text {
      font-size: 28px;
      letter-spacing: 4px;
      text-shadow: 0 0 8px #00ff00;
      margin-bottom: 24px;
    }
    .action-btn {
      padding: 14px 24px;
      font-size: 16px;
      letter-spacing: 2px;
      width: auto;
    }

    .progress {
      position: fixed;
      top: 30px;
      right: 30px;
      font-size: 14px;
      z-index: 3;
      letter-spacing: 2px;
      opacity: 0.7;
    }
    .progress .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 1px solid #00ff00;
      margin-left: 4px;
      vertical-align: middle;
    }
    .progress .dot.on {
      background: #00ff00;
      box-shadow: 0 0 6px #00ff00;
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>

  <a href="tools.html" target="_blank" class="tools-link">// TOOLS</a>

  <div class="progress glow">
    FRAGMENTOS
    <span class="dot" id="dot-morse"></span>
    <span class="dot" id="dot-b64"></span>
    <span class="dot" id="dot-hex"></span>
  </div>

  <div class="page">
    <div class="header-block glow" id="header"></div>

    <div class="grid">
      <div class="card" id="card-morse">
        <div class="card-label">FRAGMENTO 01 // MORSE</div>
        <h2 class="card-title">// MENSAGEM</h2>
        <textarea id="input-morse" placeholder="" autocomplete="off" spellcheck="false"></textarea>
        <button class="verify-mini" data-name="morse">&gt; VERIFICAR</button>
        <div class="card-status" id="status-morse"></div>
      </div>

      <div class="card" id="card-b64">
        <div class="card-label">FRAGMENTO 02 // BASE64</div>
        <h2 class="card-title">// MENSAGEM</h2>
        <textarea id="input-b64" placeholder="" autocomplete="off" spellcheck="false"></textarea>
        <button class="verify-mini" data-name="b64">&gt; VERIFICAR</button>
        <div class="card-status" id="status-b64"></div>
      </div>

      <div class="card" id="card-hex">
        <div class="card-label">FRAGMENTO 03 // HEX</div>
        <h2 class="card-title">// MENSAGEM</h2>
        <textarea id="input-hex" placeholder="" autocomplete="off" spellcheck="false"></textarea>
        <button class="verify-mini" data-name="hex">&gt; VERIFICAR</button>
        <div class="card-status" id="status-hex"></div>
      </div>
    </div>

    <div class="reveal glow" id="reveal">
      <div class="reveal-label">// MENSAGEM RECONSTRUÍDA</div>
      <div class="reveal-text" id="revealText"></div>
      <div id="billyClose"></div>
      <button class="action-btn glow" id="nextBtn" style="display:none; margin-top: 20px;">
        &gt; CONTINUAR
      </button>
    </div>
  </div>

  <audio id="ambient" loop preload="auto">
    <source src="assets/audio/clock.mp3" type="audio/mpeg">
  </audio>
  <audio id="successFx" preload="auto">
    <source src="assets/audio/click.mp3" type="audio/mpeg">
  </audio>
  <audio id="finalFx" preload="auto">
    <source src="assets/audio/warm.mp3" type="audio/mpeg">
  </audio>
  <audio id="billyVoice" preload="auto">
    <source src="assets/audio/sgt-billy-fragmentos.mp3" type="audio/mpeg">
  </audio>

  <script type="module">
    import { typeLines, typeLine, wait } from './assets/js/typewriter.js';
    import { CONFIG } from './assets/js/config.js';
    import { normalize } from './assets/js/decoders.js';
    import { playSuccess, playError, playBigSuccess, pulseSuccess, shakeError } from './assets/js/feedback.js';

    const ambient = document.getElementById('ambient');
    const successFx = document.getElementById('successFx');
    const finalFx = document.getElementById('finalFx');
    const billyVoice = document.getElementById('billyVoice');
    ambient.volume = 0.1;
    successFx.volume = 0.4;
    finalFx.volume = 0.5;
    billyVoice.volume = 0.85;

    const header = document.getElementById('header');
    const reveal = document.getElementById('reveal');
    const revealText = document.getElementById('revealText');
    const billyClose = document.getElementById('billyClose');
    const nextBtn = document.getElementById('nextBtn');

    const fragments = [
      {
        name: 'morse',
        expected: CONFIG.FRAGMENT_MORSE,
        billy: 'Sinal antigo. Da época dos cães militares.'
      },
      {
        name: 'b64',
        expected: CONFIG.FRAGMENT_B64,
        billy: 'Codificação de transmissão padrão. Você não esqueceu.'
      },
      {
        name: 'hex',
        expected: CONFIG.FRAGMENT_HEX,
        billy: 'Hexadecimal. Limpo. Como sempre.'
      },
    ];

    const completed = { morse: false, b64: false, hex: false };

    // Header lines (Billy entry)
    (async () => {
      ambient.play().catch(() => {});
      billyVoice.currentTime = 0;
      billyVoice.play().catch(() => {});
      await wait(400);
      await typeLine(header, '> Três artefatos. Três sistemas.', { speed: 30, jitter: 15 });
      await typeLine(header, '> Cada um carrega um pedaço da próxima coordenada.', { speed: 30, jitter: 15, className: 'billy-line muted' });
      await typeLine(header, '> Decodifique. Combine.', { speed: 30, jitter: 15, className: 'billy-line muted' });
    })();

    function setupCard(frag) {
      const input = document.getElementById(`input-${frag.name}`);
      const status = document.getElementById(`status-${frag.name}`);
      const card = document.getElementById(`card-${frag.name}`);
      const dot = document.getElementById(`dot-${frag.name}`);
      const verifyBtn = card.querySelector('.verify-mini');

      function verify() {
        if (completed[frag.name]) return;
        const guess = input.value;
        if (!guess.trim()) {
          status.textContent = '[ campo vazio ]';
          return;
        }

        if (normalize(guess) === normalize(frag.expected)) {
          completed[frag.name] = true;
          card.classList.add('completed');
          dot.classList.add('on');
          status.textContent = '> validado';
          status.classList.remove('error');
          input.disabled = true;
          verifyBtn.disabled = true;

          playSuccess();
          pulseSuccess(card);

          // Billy comment for this fragment
          const billyEl = document.createElement('div');
          billyEl.className = 'billy-line muted';
          billyEl.style.marginTop = '10px';
          billyEl.style.fontStyle = 'italic';
          billyEl.textContent = `> ${frag.billy}`;
          card.appendChild(billyEl);

          checkAllComplete();
        } else {
          status.textContent = '> mensagem inválida';
          status.classList.add('error');
          playError();
          shakeError(card);
          setTimeout(() => status.classList.remove('error'), 600);
        }
      }

      verifyBtn.addEventListener('click', verify);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); verify(); }
      });
    }

    fragments.forEach(setupCard);

    async function checkAllComplete() {
      if (!completed.morse || !completed.b64 || !completed.hex) return;

      await wait(800);
      reveal.classList.add('show');
      finalFx.currentTime = 0;
      finalFx.play().catch(() => {});
      playBigSuccess();

      // Reveal animation: types the combined sentence character by character
      const fullSentence = CONFIG.FRAGMENT_FULL;
      revealText.textContent = '';
      for (const ch of fullSentence) {
        revealText.textContent += ch;
        await wait(60 + Math.random() * 40);
      }

      await wait(900);

      const billyLines = [
        '> Três fragmentos recuperados.',
        '> A frase aponta o caminho.',
        ' ',
        '> Vá até o meu filho.',
        '> Ele guarda algo por mim.',
      ];

      await typeLines(billyClose, billyLines, {
        speed: 35, jitter: 15, linePause: 500
      });

      await wait(600);
      nextBtn.style.display = 'inline-block';
      reveal.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    nextBtn.addEventListener('click', () => {
      successFx.currentTime = 0;
      successFx.play().catch(() => {});
      document.body.style.transition = 'opacity 0.6s';
      document.body.style.opacity = '0';
      setTimeout(() => {
        window.location.href = 'fragmento-2.html';
      }, 700);
    });
  </script>
</body>
</html>
